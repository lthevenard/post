<header>Gabarito P1 - Teoria da Decisão</header>
<h2 id="3a---argumentos-consequencialistas">3.A - Argumentos consequencialistas</h2>
<p><span class="vf false">F</span> <strong>Falsa.</strong></p>
<div class="original-item">
<b>A)</b> Argumentos consequencialistas se distinguem dos raciocínios jurídicos usuais porque os primeiros se apoiam em consequências factuais, e não em fontes autoritativas do passado; contudo, para que esse tipo de argumento seja coerentemente empregado, <span class="err">é necessário adotar a ética utilitarista ou uma teoria normativamente orientada à avaliação de consequências, como a Análise Econômica do Direito.</span>
</div>
<br />
<div class="small tight">
<ul>
<li>A primeira parte está correta: argumentos consequencialistas olham para efeitos práticos da decisão. O erro está em exigir adesão ao utilitarismo ou à AED.</li>
<li>Como vimos, a avaliação de consequências pode funcionar apenas como <b>ônus argumentativo jurídico</b>, sem necessariamente implicar vinculação a uma teoria moral ou a uma vertente metodológica específica.</li>
</ul>
</div>
<footer><a href="mailto:lucas.gomes@fgv.br">lucas.gomes@fgv.br</a></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="30" data-background-image="default_bg.png" data-paginate="true" data-header="Gabarito P1 - Teoria da Decisão" data-footer="lucas.gomes@fgv.br" lang="C" data-marpit-pagination="30" style="--background-image:default_bg.png;--paginate:true;--header:Gabarito P1 - Teoria da Decisão;--footer:lucas.gomes@fgv.br;background-image:default_bg.png;background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="42">
<header>Gabarito P1 - Teoria da Decisão</header>
<h2 id="3b---reforma-da-lindb">3.B - Reforma da LINDB</h2>
<p><span class="vf false">F</span> <strong>Falsa.</strong></p>
<div class="original-item">
<b>B)</b> Para Alexandre Aragão, a reforma da LINDB deve ser concebida como uma ruptura com a visão do Direito como ciência pura e com a concepção declaratória da interpretação, o que tem o condão de ampliar a discricionariedade judicial, <span class="err">sem produzir ônus argumentativos adicionais para os magistrados.</span>
</div>
<br />
<div class="small tight">
<ul>
<li>A primeira parte está alinhada à ideia de ruptura com uma visão puramente declaratória.</li>
<li>Não há erro em afirmar que isso amplia a discricionariedade judicial (esse é um elemento explícito na fala do prof. Aragão).</li>
<li><b>O erro está em negar o aumento do ônus argumentativo para os magistrados</b>. Em sua palestra Aragão destacou a preocupação dos juízes com esse ônus, com a necessidade de analisar alternativas de decisão e seus efeitos práticos.</li>
</ul>
</div>
<footer><a href="mailto:lucas.gomes@fgv.br">lucas.gomes@fgv.br</a></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="31" data-background-image="default_bg.png" data-paginate="true" data-header="Gabarito P1 - Teoria da Decisão" data-footer="lucas.gomes@fgv.br" lang="C" data-marpit-pagination="31" style="--background-image:default_bg.png;--paginate:true;--header:Gabarito P1 - Teoria da Decisão;--footer:lucas.gomes@fgv.br;background-image:default_bg.png;background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="42">
<header>Gabarito P1 - Teoria da Decisão</header>
<h2 id="3c---teorema-de-arrow">3.C - Teorema de Arrow</h2>
<p><span class="vf false">F</span> <strong>Falsa.</strong></p>
<div class="original-item">
<b>C)</b> O teorema de Arrow aprofunda o problema da integração de preferências em decisões coletivas que já havia sido revelado pelo paradoxo de Condorcet: segundo o teorema, em processos de votação <span class="err">cardinais</span>, não se consegue garantir simultaneamente um conjunto de propriedades desejáveis, como <span class="err">não-ditadura</span>, <span class="err">unversalidade ou domínio restrito</span>, <span class="err">dependência de alternativas irrelevantes</span>, monotonicidade, não-imposição e eficiência de Pareto.
</div>
<br />
<div class="small tight">
<ul>
<li>Há mais de um erro na questão. Primeiro, o Teorema de Arrow trata de sistemas ordinais de votação.</li>
<li>Além disso, a afirmativa também troca os nomes técnicos de condições desejáveis: o correto seria: &quot;<b>sistema não-ditatorial</b>&quot;; &quot;domínio <b>irrestrito</b>&quot;; e &quot;<b>independência</b> de alternativas irrelevantes&quot;.</li>
</ul>
</div>
<footer><a href="mailto:lucas.gomes@fgv.br">lucas.gomes@fgv.br</a></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="32" data-background-image="default_bg.png" data-paginate="true" data-header="Gabarito P1 - Teoria da Decisão" data-footer="lucas.gomes@fgv.br" lang="C" data-marpit-pagination="32" style="--background-image:default_bg.png;--paginate:true;--header:Gabarito P1 - Teoria da Decisão;--footer:lucas.gomes@fgv.br;background-image:default_bg.png;background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="42">
<header>Gabarito P1 - Teoria da Decisão</header>
<h2 id="3d---l-a-paul">3.D - L. A. Paul</h2>
<p><span class="vf true">V</span> <strong>Verdadeira.</strong></p>
<div class="original-item">
<b>D)</b> A crítica de L. A. Paul aos métodos de decisão racional previsto pela Teoria da Escolha Racional põe em dúvida estabilidade das preferências do agente: segundo ela, quando escolhas envolvem experiências transformadoras o decisor nunca será capaz de justificar suas escolhas racionalmente, ex ante, com base em suas preferências.
</div>
<br />
<div class="small tight">
<ul>
<li>Antes da experiência, o agente não acessa plenamente o ponto de vista que terá depois.</li>
<li>A escolha não pode ser justificada apenas por preferências previamente dadas.</li>
<li>Isso desafia a estabilidade das preferências na Teoria da Escolha Racional.</li>
</ul>
</div>
<footer><a href="mailto:lucas.gomes@fgv.br">lucas.gomes@fgv.br</a></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="33" data-background-image="default_bg.png" data-paginate="true" data-header="Gabarito P1 - Teoria da Decisão" data-footer="lucas.gomes@fgv.br" lang="C" data-marpit-pagination="33" style="--background-image:default_bg.png;--paginate:true;--header:Gabarito P1 - Teoria da Decisão;--footer:lucas.gomes@fgv.br;background-image:default_bg.png;background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="42">

<header>Gabarito P1 - Teoria da Decisão</header>

<h1 id="quest%C3%A3o-4">Questão 4</h1>
<p><em>Estado de direito e argumentos consequencialistas</em></p>
<footer><a href="mailto:lucas.gomes@fgv.br">lucas.gomes@fgv.br</a></footer>
</section>
</foreignObject><foreignObject width="1280" height="720" data-marpit-advanced-background="pseudo"><section data-background-image="default_bg.png" data-paginate="true" data-header="Gabarito P1 - Teoria da Decisão" data-footer="lucas.gomes@fgv.br" lang="C" data-marpit-pagination="34" style="" data-marpit-pagination-total="42" data-marpit-advanced-background="pseudo"></section></foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="35" data-background-image="default_bg.png" data-paginate="true" data-header="Gabarito P1 - Teoria da Decisão" data-footer="lucas.gomes@fgv.br" lang="C" data-marpit-pagination="35" style="--background-image:default_bg.png;--paginate:true;--header:Gabarito P1 - Teoria da Decisão;--footer:lucas.gomes@fgv.br;background-image:default_bg.png;background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="42">
<header>Gabarito P1 - Teoria da Decisão</header>
<h2 id="quest%C3%A3o-4---ponto-de-partida">Questão 4 - Ponto de partida</h2>
<blockquote>
<p>“É (...) com apoio na Constituição e nas leis - e não na busca pragmática de resultados - que se deverá promover a solução do justo equilíbrio (...)”</p>
<p>“O respeito pela autoridade da Constituição e das leis [não] configuraria fator (...) de frustração da eficácia da investigação social.”</p>
</blockquote>
<br />
<ul>
<li>A questão pede para o aluno mostrar por que essa oposição entre <strong>Estado de direito</strong> e <strong>consideração de consequências</strong> não deve ser tratada como necessária.</li>
</ul>
<footer><a href="mailto:lucas.gomes@fgv.br">lucas.gomes@fgv.br</a></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="36" data-background-image="default_bg.png" data-paginate="true" data-header="Gabarito P1 - Teoria da Decisão" data-footer="lucas.gomes@fgv.br" lang="C" data-marpit-pagination="36" style="--background-image:default_bg.png;--paginate:true;--header:Gabarito P1 - Teoria da Decisão;--footer:lucas.gomes@fgv.br;background-image:default_bg.png;background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="42">
<header>Gabarito P1 - Teoria da Decisão</header>
<h2 id="4a---compatibilidade-com-o-estado-de-direito">4.A - Compatibilidade com o Estado de Direito</h2>
<div class="small tight">
<ol>
<li><strong>O próprio direito positivo pode exigir a consideração de consequências.</strong><br />
LINDB, arts. 5º e 20: fins sociais, bem comum e consequências práticas.</li>
<li><strong>Métodos tradicionais de exegese também mobilizam consequências.</strong><br />
Ex.: estrutura teleológica dos princípios e proporcionalidade em sentido estrito.</li>
<li><strong>Decisões judiciais produzem efeitos no mundo, difíceis de ignorar.</strong><br />
Em certos casos, abstrair esses efeitos empobrece a própria fundamentação.</li>
<li><strong>Na prática institucional, juízes já consideram consequências.</strong><br />
As pesquisas discutidas em aula mostram convivência entre parâmetros legais e consequências sociais.</li>
<li><strong>Nem todo consequencialismo é contra legem ou se opõem diretamente a argumentos institucionais.</strong><br />
Há posturas <i>secundum legem</i> e <i>praeter legem</i>, bem como consequencialismo fraco e residual.</li>
</ol>
</div>
<footer><a href="mailto:lucas.gomes@fgv.br">lucas.gomes@fgv.br</a></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="37" data-background-image="default_bg.png" data-paginate="true" data-header="Gabarito P1 - Teoria da Decisão" data-footer="lucas.gomes@fgv.br" lang="C" data-marpit-pagination="37" style="--background-image:default_bg.png;--paginate:true;--header:Gabarito P1 - Teoria da Decisão;--footer:lucas.gomes@fgv.br;background-image:default_bg.png;background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="42">
<header>Gabarito P1 - Teoria da Decisão</header>
<h2 id="4a---resposta-esperada">4.A - Resposta esperada</h2>
<div class="small tight">
<ul>
<li>A fala do ministro exagera ao opor, de forma rígida, Constituição e leis, de um lado, e busca pragmática de resultados, de outro.</li>
<li>Com base nas aulas 1 e 2, a resposta correta é mostrar que considerar consequências pode ser uma exigência do próprio Direito, pode estar embutido em métodos interpretativos tradicionais e pode ocorrer de modo compatível com limites institucionais. Ou seja, <strong>era esperado que o aluno mobilizasse os argumentos que discutimos em aula</strong>.</li>
<li>Assim, <strong>não há tensão necessária</strong> entre Estado de direito e argumentos consequencialistas; há, no máximo, tensão contingente em certas modalidades mais agressivas de consequencialismo.</li>
<li>Em especial, a tensão cresce em cenários <i>contra legem</i> e de consequencialismo forte.</li>
</ul>
</div>
<footer><a href="mailto:lucas.gomes@fgv.br">lucas.gomes@fgv.br</a></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="38" data-background-image="default_bg.png" data-paginate="true" data-header="Gabarito P1 - Teoria da Decisão" data-footer="lucas.gomes@fgv.br" lang="C" data-marpit-pagination="38" style="--background-image:default_bg.png;--paginate:true;--header:Gabarito P1 - Teoria da Decisão;--footer:lucas.gomes@fgv.br;background-image:default_bg.png;background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="42">
<header>Gabarito P1 - Teoria da Decisão</header>
<h2 id="4b---estrutura-do-argumento-consequencialista">4.B - Estrutura do argumento consequencialista</h2>
<table>
<thead>
<tr>
<th style="text-align:left">Elemento</th>
<th style="text-align:left">Conteúdo</th>
<th style="text-align:left">Dimensão</th>
</tr>
</thead>
<tbody>
<tr>
<td style="text-align:left"><strong>Ponto de vista</strong></td>
<td style="text-align:left">A decisão/ação X é desejável</td>
<td style="text-align:left">-</td>
</tr>
<tr>
<td style="text-align:left"><strong>Premissa empírica</strong></td>
<td style="text-align:left">X produz a consequência Y</td>
<td style="text-align:left">positiva</td>
</tr>
<tr>
<td style="text-align:left"><strong>Premissa normativa</strong></td>
<td style="text-align:left">Y é desejável</td>
<td style="text-align:left">normativa</td>
</tr>
</tbody>
</table>
<br />
<ul>
<li>Em linguagem da aula 2:<br />
<strong>alternativas de ação</strong> + <strong>consequências vinculadas às alternativas</strong> + <strong>relação de preferência entre as consequências</strong>.</li>
</ul>
<footer><a href="mailto:lucas.gomes@fgv.br">lucas.gomes@fgv.br</a></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="39" data-background-image="default_bg.png" data-paginate="true" data-header="Gabarito P1 - Teoria da Decisão" data-footer="lucas.gomes@fgv.br" lang="C" data-marpit-pagination="39" style="--background-image:default_bg.png;--paginate:true;--header:Gabarito P1 - Teoria da Decisão;--footer:lucas.gomes@fgv.br;background-image:default_bg.png;background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="42">
<header>Gabarito P1 - Teoria da Decisão</header>
<h2 id="4b---desafios-da-dimens%C3%A3o-positiva">4.B - Desafios da dimensão positiva</h2>
<div class="small tight">
<ul>
<li><strong>Especificação do problema decisório</strong>:<br />
é preciso identificar quais alternativas realmente estão disponíveis e quais consequências devem entrar na análise.</li>
<li><strong>Desconhecimento do futuro / erros de prognose</strong>:<br />
o julgador precisa estimar cenários e probabilidades sob incerteza.</li>
<li><strong>Cadeias causais frágeis</strong>:<br />
previsões podem escorregar para raciocínios especulativos, como a falácia do efeito-dominó.</li>
</ul>
</div>
<br />
<ul>
<li>Ou seja, nessa dimensão, os desafios estão relacionados a demonstrar, com algum rigor empírico, que a decisão X realmente tende a produzir Y.</li>
</ul>
<footer><a href="mailto:lucas.gomes@fgv.br">lucas.gomes@fgv.br</a></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="40" data-background-image="default_bg.png" data-paginate="true" data-header="Gabarito P1 - Teoria da Decisão" data-footer="lucas.gomes@fgv.br" lang="C" data-marpit-pagination="40" style="--background-image:default_bg.png;--paginate:true;--header:Gabarito P1 - Teoria da Decisão;--footer:lucas.gomes@fgv.br;background-image:default_bg.png;background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="42">
<header>Gabarito P1 - Teoria da Decisão</header>
<h2 id="4b---desafios-da-dimens%C3%A3o-normativa">4.B - Desafios da dimensão normativa</h2>
<div class="small tight">
<ul>
<li><strong>Seleção dos critérios de valoração</strong>:<br />
quais consequências importam para o julgamento?</li>
<li><strong>Operacionalização dos critérios escolhidos</strong>:<br />
o que conta, concretamente, como eficiência, segurança, igualdade, bem comum etc.?</li>
<li><strong>Conflitos entre critérios</strong>:<br />
consequências desejáveis segundo um critério podem ser indesejáveis segundo outro.</li>
</ul>
</div>
<br />
<ul>
<li>Nesta dimensão, os desafios consistem em justificar por que uma consequência (e, por conseguinte, a decisão que a produz) deve ser considerada melhor do que outra.</li>
</ul>
<footer><a href="mailto:lucas.gomes@fgv.br">lucas.gomes@fgv.br</a></footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section data-background-image="default_bg.png" data-paginate="true" data-header="Gabarito P1 - Teoria da Decisão" data-footer="lucas.gomes@fgv.br" lang="C" data-marpit-pagination="41" style="--background-image:default_bg.png;--paginate:true;--header:Gabarito P1 - Teoria da Decisão;--footer:lucas.gomes@fgv.br;background-image:default_bg.png;background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="42" data-marpit-advanced-background="background"><div data-marpit-advanced-background-container="true" data-marpit-advanced-background-direction="horizontal"><figure style="background-image:url(&quot;section_bg.png&quot;);"></figure></div></section></foreignObject><foreignObject width="1280" height="720"><section id="41" data-background-image="default_bg.png" data-paginate="true" data-header="Gabarito P1 - Teoria da Decisão" data-footer="lucas.gomes@fgv.br" lang="C" data-marpit-pagination="41" style="--background-image:default_bg.png;--paginate:true;--header:Gabarito P1 - Teoria da Decisão;--footer:lucas.gomes@fgv.br;background-image:default_bg.png;background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="42" data-marpit-advanced-background="content">

<p><em>Exemplo de jogo</em></p>

</foreignObject><foreignObject width="1280" height="720" data-marpit-advanced-background="pseudo"><section data-background-image="default_bg.png" data-paginate="true" data-header="Gabarito P1 - Teoria da Decisão" data-footer="lucas.gomes@fgv.br" lang="C" data-marpit-pagination="41" style="" data-marpit-pagination-total="42" data-marpit-advanced-background="pseudo"></section></foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="42" data-background-image="default_bg.png" data-paginate="true" data-header="Gabarito P1 - Teoria da Decisão" data-footer="lucas.gomes@fgv.br" lang="C" data-marpit-pagination="42" style="--background-image:default_bg.png;--paginate:true;--header:Gabarito P1 - Teoria da Decisão;--footer:lucas.gomes@fgv.br;background-image:default_bg.png;background-position:center;background-repeat:no-repeat;background-size:cover;" data-marpit-pagination-total="42">
<header>Gabarito P1 - Teoria da Decisão</header>
<h2 id="quest%C3%A3o-5---exemplo-simples">Questão 5 - Exemplo simples</h2>
<table>
<thead>
<tr>
<th style="text-align:left">J1 \ J2</th>
<th style="text-align:center">E</th>
<th style="text-align:center">F</th>
<th style="text-align:center">G</th>
<th style="text-align:center"><s>H</s></th>
</tr>
</thead>
<tbody>
<tr>
<td style="text-align:left">A</td>
<td style="text-align:center"><strong>(5,5)</strong></td>
<td style="text-align:center">(0,0)</td>
<td style="text-align:center">(0,0)</td>
<td style="text-align:center">(<strong>1</strong>,-1)</td>
</tr>
<tr>
<td style="text-align:left">B</td>
<td style="text-align:center">(0,0)</td>
<td style="text-align:center"><strong>(2,2)</strong></td>
<td style="text-align:center">(0,0)</td>
<td style="text-align:center">(-1,-1)</td>
</tr>
<tr>
<td style="text-align:left">C</td>
<td style="text-align:center">(0,0)</td>
<td style="text-align:center">(0,0)</td>
<td style="text-align:center"><strong>(2,2)</strong></td>
<td style="text-align:center">(-1,-1)</td>
</tr>
<tr>
<td style="text-align:left"><s>D</s></td>
<td style="text-align:center">(-1,<strong>1</strong>)</td>
<td style="text-align:center">(-1,-1)</td>
<td style="text-align:center">(-1,-1)</td>

<ul>
<li>Equilíbrios de Nash: (A, E); (B, F); (C, G)</li>
