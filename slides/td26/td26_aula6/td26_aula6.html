<header>Aula 6 – Introdução à Teoria dos Jogos</header>
<h2 id="conclus%C3%A3o-geral-sobre-m%C3%A9todos-de-decis%C3%A3o-racional-sob-condi%C3%A7%C3%B5es-de-ignor%C3%A2ncia-1">Conclusão geral sobre métodos de decisão racional sob condições de ignorância</h2>
<ul>
<li>Todos os métodos enfrentam limitações.
<ul>
<li>Para utilizá-los é necessário entender qual método melhor se aplica ao problema analisado.</li>
<li>Sistema de votação dos métodos não funciona (pode incorrer no mesmo problema indicado por Arrow).</li>
</ul>
</li>
</ul>
<ul>
<li data-marpit-fragment="1">Limites de racionalidade em casos de ignorância profunda.
<ul>
<li>Método maximin é o único que admite uma escala ordinal de preferências.</li>
<li>Problema das experiências transformativas não tem solução na literatura.</li>
</ul>
</li>
</ul>
<footer><a href="mailto:lucas.gomes@fgv.br">lucas.gomes@fgv.br</a> | 31/03/2026</footer>
</section>

<header>Aula 6 – Introdução à Teoria dos Jogos</header>
<h2 id="o-que-%C3%A9-um-jogo">O que é um jogo?</h2>
<ul>
<li data-marpit-fragment="1">Interação estratégica entre os jogadores.</li>
<li data-marpit-fragment="2">Conceito de estratégia: antecipar ações/decisões alheias.</li>
<li data-marpit-fragment="3">Qual é a aplicabilidade desse conceito a fenômenos sociais e jurídicos?</li>
</ul>

<header>Aula 6 – Introdução à Teoria dos Jogos</header>
<h2 id="formaliza%C3%A7%C3%A3o-de-um-jogo">Formalização de um jogo</h2>
<ul>
<li>Elementos estruturais mínimos
<ul>
<li>Jogadores</li>
<li>Estratégias (cursos de ação ou ‘jogadas')</li>
<li>Payoffs (para cada jogador e cada combinação de jogadas)</li>
</ul>
</li>
</ul>

<header>Aula 6 – Introdução à Teoria dos Jogos</header>
<h2 id="m%C3%A9todo-do-equil%C3%ADbrio-de-estrat%C3%A9gias-dominantes">Método do equilíbrio de estratégias dominantes</h2>
<ul>
<li><span class="under">Solução</span>: <strong>(A, D)</strong></li>
<li><span class="under">Método de solução</span>: Identificamos a estratégia dominante de um jogador, quando ela existe, e presumimos que ele certamente optará por ela.
<ul>
<li>Em alguns casos, todos os jogadores têm estratégias dominantes (equilíbrio de estratégias dominantes).</li>
<li>Em outros casos, solucionando o jogo para parte dos jogadores, conseguimos prever a melhor resposta dos demais.</li>
</ul>
</li>
</ul>

<ul>
<li><span class="under">Solução</span>: <strong>(B, E)</strong></li>
<li><span class="under">Forma de solução</span>: Eliminamos gradualmente as estratégias de cada jogador que nunca seriam escolhidas.</li>
<li>A cada passo descartamos as estratégias dominadas:
<ul>
<li>Se o jogador 1 tem uma estratégia dominada, eliminamos a respectiva linha.</li>
<li>Se o jogador 2 tem uma estratégia dominada, eliminamos a respectiva coluna.</li>
<li>Repetimos o processo até sobrar apenas um par de estratégias.</li>
</ul>
</li>

<header>Aula 6 – Introdução à Teoria dos Jogos</header>
<h2 id="equil%C3%ADbrio-de-nash">Equilíbrio de Nash</h2>
<ul>
<li data-marpit-fragment="1">Dados dois jogadores A e B dizemos que a combinação de estratégias (a, b) desses jogadores, respectivamente, é um “equilíbrio de Nash” se 'a' é a melhor resposta do Jogador A à estratégia ‘b' do Jogador B, ao mesmo tempo em que ‘b' é a melhor resposta do Jogador B à estratégia ‘a' do Jogador A.
<ul>
<li data-marpit-fragment="2">Cada jogador dá sua melhor resposta à jogada do outro.</li>
<li data-marpit-fragment="3">Pode haver mais de um equilíbrio de Nash em um mesmo jogo.</li>
<li data-marpit-fragment="4">Qualquer jogo finito tem ao menos um equilíbrio de Nash (que pode ser em estratégias mistas).</li>
</ul>
</li>
</ul>
<footer><a href="mailto:lucas.gomes@fgv.br">lucas.gomes@fgv.br</a> | 31/03/2026</footer>
